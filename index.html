<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספר ספקים - דרור חינוך</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        header h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-admin { background: #64748b; color: white; margin-right: auto; }
        .btn-danger { background: var(--danger); color: white; }

        .admin-banner {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            color: #92400e;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-header {
            margin-bottom: 15px;
        }

        .vendor-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .vendor-id {
            font-size: 13px;
            color: var(--text-muted);
        }

        .vendor-info {
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vendor-info i { color: var(--primary); width: 16px; text-align: center; }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-top: 10px;
        }

        .badge-active { background: #dcfce7; color: #166534; }
        .badge-inactive { background: #fee2e2; color: #991b1b; }

        .admin-actions {
            display: none;
            gap: 10px;
            margin-top: 15px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center; justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white; padding: 25px; border-radius: 16px;
            width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ספר ספקים דיגיטלי</h1>
        <p>מערכת חכמה ומודרנית לניהול ודירוג ספקי דרור חינוך</p>
    </header>

    <div class="admin-banner" id="adminBanner">
        <span><i class="fa-solid fa-user-shield"></i> מצב ניהול פעיל - באפשרותך להוסיף, לערוך ולמחוק ספקים.</span>
        <button class="btn btn-danger" onclick="logoutAdmin()" style="padding: 6px 12px; font-size: 14px;">יציאה</button>
    </div>

    <div class="controls">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="חפש לפי שם ספק, מספר או תחום עיסוק..." oninput="filterVendors()">
        </div>
        <button class="btn btn-primary" id="addBtn" style="display:none;" onclick="openModal('add')"><i class="fa-solid fa-plus"></i> הוספת ספק</button>
        <button class="btn btn-admin" id="loginBtn" onclick="loginAdmin()"><i class="fa-solid fa-lock"></i> ניהול מערכת</button>
    </div>

    <div class="grid" id="vendorsGrid"></div>
</div>

<!-- Modal הוספה / עריכה -->
<div class="modal" id="vendorModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-bottom: 20px;">הוספת ספק חדש</h3>
        <input type="hidden" id="editIndex">
        <div class="form-group">
            <label>מספר ספק</label>
            <input type="text" id="formId">
        </div>
        <div class="form-group">
            <label>שם ספק</label>
            <input type="text" id="formName">
        </div>
        <div class="form-group">
            <label>טלפון</label>
            <input type="text" id="formPhone">
        </div>
        <div class="form-group">
            <label>אימייל</label>
            <input type="email" id="formEmail">
        </div>
        <div class="form-group">
            <label>תחום עיסוק</label>
            <input type="text" id="formCategory">
        </div>
        <div class="form-group">
            <label>סטטוס</label>
            <select id="formStatus">
                <option value="פעיל">פעיל</option>
                <option value="לא פעיל">לא פעיל</option>
            </select>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
            <button class="btn" onclick="closeModal()">ביטול</button>
            <button class="btn btn-primary" onclick="saveVendor()">שמירה</button>
        </div>
    </div>
</div>

<script>
    const defaultVendors = [
        { id: "000", name: "ספק כללי", phone: "—", email: "—", category: "כללי", status: "פעיל" },
        { id: "001", name: "מלגות", phone: "—", email: "—", category: "ייחודי", status: "פעיל" },
        { id: "200001", name: "כל", phone: "—", email: "—", category: "כללי", status: "פעיל" },
        { id: "200002", name: "722448", phone: "—", email: "—", category: "—", status: "לא פעיל" },
        { id: "200003", name: "770015", phone: "—", email: "—", category: "—", status: "פעיל" }
    ];

    let vendors = JSON.parse(localStorage.getItem('vendors')) || defaultVendors;
    let isAdmin = false;

    function renderVendors(dataToRender = vendors) {
        const grid = document.getElementById('vendorsGrid');
        grid.innerHTML = '';

        dataToRender.forEach((vendor, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="vendor-name">${vendor.name}</div>
                    <div class="vendor-id">מספר ספק: ${vendor.id}</div>
                </div>
                <div>
                    <div class="vendor-info"><i class="fa-solid fa-phone"></i> ${vendor.phone || '—'}</div>
                    <div class="vendor-info"><i class="fa-solid fa-envelope"></i> ${vendor.email || '—'}</div>
                    <div class="vendor-info"><i class="fa-solid fa-briefcase"></i> ${vendor.category || '—'}</div>
                    <span class="badge ${vendor.status === 'פעיל' ? 'badge-active' : 'badge-inactive'}">${vendor.status}</span>
                </div>
                <div class="admin-actions" style="display: ${isAdmin ? 'flex' : 'none'}">
                    <button class="btn btn-primary" style="padding:6px 12px; font-size:14px;" onclick="openModal('edit', ${index})"><i class="fa-solid fa-pen"></i> עריכה</button>
                    <button class="btn btn-danger" style="padding:6px 12px; font-size:14px;" onclick="deleteVendor(${index})"><i class="fa-solid fa-trash"></i> מחיקה</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filterVendors() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = vendors.filter(v => 
            v.name.toLowerCase().includes(query) || 
            v.id.toString().includes(query) || 
            (v.category && v.category.toLowerCase().includes(query))
        );
        renderVendors(filtered);
    }

    function loginAdmin() {
        const pass = prompt("הקש סיסמת מנהל מערכת:");
        if (pass === "dror2026") {
            isAdmin = true;
            document.getElementById('adminBanner').style.display = 'flex';
            document.getElementById('addBtn').style.display = 'inline-flex';
            document.getElementById('loginBtn').style.display = 'none';
            renderVendors();
        } else if (pass !== null) {
            alert("סיסמה שגויה!");
        }
    }

    function logoutAdmin() {
        isAdmin = false;
        document.getElementById('adminBanner').style.display = 'none';
        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('loginBtn').style.display = 'inline-flex';
        renderVendors();
    }

    function openModal(mode, index = null) {
        const modal = document.getElementById('vendorModal');
        modal.style.display = 'flex';
        
        if (mode === 'edit') {
            document.getElementById('modalTitle').innerText = 'עריכת ספק';
            document.getElementById('editIndex').value = index;
            document.getElementById('formId').value = vendors[index].id;
            document.getElementById('formName').value = vendors[index].name;
            document.getElementById('formPhone').value = vendors[index].phone;
            document.getElementById('formEmail').value = vendors[index].email;
            document.getElementById('formCategory').value = vendors[index].category;
            document.getElementById('formStatus').value = vendors[index].status;
        } else {
            document.getElementById('modalTitle').innerText = 'הוספת ספק חדש';
            document.getElementById('editIndex').value = '';
            document.getElementById('formId').value = '';
            document.getElementById('formName').value = '';
            document.getElementById('formPhone').value = '';
            document.getElementById('formEmail').value = '';
            document.getElementById('formCategory').value = '';
            document.getElementById('formStatus').value = 'פעיל';
        }
    }

    function closeModal() {
        document.getElementById('vendorModal').style.display = 'none';
    }

    function saveVendor() {
        const index = document.getElementById('editIndex').value;
        const newVendor = {
            id: document.getElementById('formId').value,
            name: document.getElementById('formName').value,
            phone: document.getElementById('formPhone').value,
            email: document.getElementById('formEmail').value,
            category: document.getElementById('formCategory').value,
            status: document.getElementById('formStatus').value
        };

        if (index === '') {
            vendors.push(newVendor);
        } else {
            vendors[index] = newVendor;
        }

        localStorage.setItem('vendors', JSON.stringify(vendors));
        closeModal();
        renderVendors();
    }

    function deleteVendor(index) {
        if (confirm("האם אתה בטוח שברצונך למחוק ספק זה?")) {
            vendors.splice(index, 1);
            localStorage.setItem('vendors', JSON.stringify(vendors));
            renderVendors();
        }
    }

    renderVendors();
</script>
</body>
</html>
