<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספר טלפונים דיגיטלי - ספקים</title>
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <div class="max-w-6xl mx-auto">
        
        <!-- כותרת ראשית ומעבר מצבים -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-indigo-900 flex items-center gap-2">
                    <i class="fa-solid fa-address-book text-indigo-600"></i>
                    ספר ספקים דיגיטלי
                </h1>
                <p class="text-gray-600 mt-1">ניהול, דירוג ויצירת קשר מהירה עם ספקי החברה</p>
            </div>
            
            <!-- כפתור מעבר משתמש / מנהל -->
            <button id="toggleViewBtn" onclick="toggleView()" class="glass px-5 py-2.5 rounded-full shadow-md font-semibold text-indigo-700 hover:bg-indigo-50 transition-all duration-300 flex items-center gap-2">
                <i id="viewIcon" class="fa-solid fa-user-gear text-lg"></i>
                <span id="viewText">מעבר לממשק מנהל</span>
            </button>
        </header>

        <!-- ========================================== -->
        <!--             ממשק משתמש קצה                 -->
        <!-- ========================================== -->
        <main id="userView" class="space-y-6">
            <!-- שורת חיפוש וסינון קטגוריות -->
            <div class="glass p-5 rounded-2xl shadow-lg flex flex-col md:flex-row gap-4 items-center">
                <div class="relative w-full md:w-1/3">
                    <i class="fa-solid fa-magnifying-glass absolute right-4 top-3.5 text-gray-400"></i>
                    <input type="text" id="searchInput" oninput="renderUserList()" placeholder="חפש ספק, תחום או איש קשר..." class="w-full pr-11 pl-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                </div>
                
                <!-- רשימת קטגוריות לסינון מהיר (רק פעילות יוצגו כאן!) -->
                <div class="flex flex-wrap gap-2 w-full md:w-2/3" id="userCategoriesContainer">
                    <!-- ייווצר דינמית -->
                </div>
            </div>

            <!-- רשימת ספקים כרטיסיות -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="vendorsGrid">
                <!-- ייווצר דינמית -->
            </div>
        </main>

        <!-- ========================================== -->
        <!--            ממשק מנהל פרודקטיבי             -->
        <!-- ========================================== -->
        <main id="adminView" class="hidden space-y-6">
            
            <!-- כרטיסי מידע מהיר (Stats) -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass p-4 rounded-xl shadow flex items-center gap-4 border-r-4 border-indigo-600">
                    <div class="p-3 bg-indigo-100 rounded-full text-indigo-600">
                        <i class="fa-solid fa-truck-field text-xl"></i>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500">סה"כ ספקים</div>
                        <div class="text-2xl font-bold" id="statTotalVendors">0</div>
                    </div>
                </div>
                <div class="glass p-4 rounded-xl shadow flex items-center gap-4 border-r-4 border-emerald-600">
                    <div class="p-3 bg-emerald-100 rounded-full text-emerald-600">
                        <i class="fa-solid fa-folder text-xl"></i>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500">קטגוריות פעילות</div>
                        <div class="text-2xl font-bold" id="statActiveCategories">0</div>
                    </div>
                </div>
                <div class="glass p-4 rounded-xl shadow flex items-center gap-4 border-r-4 border-amber-500">
                    <div class="p-3 bg-amber-100 rounded-full text-amber-500">
                        <i class="fa-solid fa-star text-xl"></i>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500">ממוצע דירוגים</div>
                        <div class="text-2xl font-bold" id="statAvgRating">0.0</div>
                    </div>
                </div>
            </div>

            <!-- אזור עבודה מפוצל (Split Screen לפרודוקטיביות מקסימלית) -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <!-- עמודה ימנית: ניהול וסינון קטגוריות (פעיל/לא פעיל) -->
                <div class="glass p-6 rounded-2xl shadow-lg space-y-6 h-fit">
                    <div class="flex justify-between items-center border-b pb-3">
                        <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                            <i class="fa-solid fa-sliders text-indigo-600"></i>
                            ניהול קטגוריות ונראות
                        </h3>
                    </div>
                    
                    <!-- הוספת קטגוריה חדשה -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500">הוסף קטגוריה חדשה</label>
                        <div class="flex gap-2">
                            <input type="text" id="newCategoryInput" placeholder="שם קטגוריה..." class="flex-grow px-3 py-2 text-sm rounded-lg border focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            <button onclick="addNewCategory()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg text-sm transition-all">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>

                    <!-- רשימת הקטגוריות עם כפתור Toggle (פעיל/לא פעיל) -->
                    <div class="space-y-3">
                        <label class="text-xs font-bold text-gray-500">מצב קטגוריות (לחץ לשינוי סטטוס):</label>
                        <div id="adminCategoriesContainer" class="space-y-2">
                            <!-- ייווצר דינמית -->
                        </div>
                    </div>
                </div>

                <!-- עמודה מרכזית ושמאלית: ניהול ספקים מהיר (הוספה/עריכה וטבלה) -->
                <div class="lg:col-span-2 space-y-6">
                    
                    <!-- טופס מהיר להוספה / עריכת ספק (סגור כברירת מחדל, נפתח בלחיצה) -->
                    <div class="glass p-5 rounded-2xl shadow-lg">
                        <div class="flex justify-between items-center mb-4 cursor-pointer" onclick="toggleAddForm()">
                            <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                                <i class="fa-solid fa-user-plus text-indigo-600"></i>
                                <span id="formTitle">הוספת ספק חדש</span>
                            </h3>
                            <i id="formChevron" class="fa-solid fa-chevron-down text-gray-400 transition-transform"></i>
                        </div>
                        
                        <form id="vendorForm" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="hidden" id="editIndex">
                            
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">שם הספק/החברה *</label>
                                <input type="text" id="vendorName" required class="w-full px-3 py-2 text-sm rounded-lg border focus:ring-2 focus:ring-indigo-500">
                            </div>
                            
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">קטגוריה *</label>
                                <select id="vendorCategory" required class="w-full px-3 py-2 text-sm rounded-lg border focus:ring-2 focus:ring-indigo-500 bg-white">
                                    <!-- יתמלא דינמית -->
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">איש קשר</label>
                                <input type="text" id="vendorContact" class="w-full px-3 py-2 text-sm rounded-lg border focus:ring-2 focus:ring-indigo-500">
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">טלפון ליצירת קשר *</label>
                                <input type="tel" id="vendorPhone" required class="w-full px-3 py-2 text-sm rounded-lg border focus:ring-2 focus:ring-indigo-500">
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">אימייל</label>
                                <input type="email" id="vendorEmail" class="w-full px-3 py-2 text-sm rounded-lg border focus:ring-2 focus:ring-indigo-500">
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">דירוג התחלתי (1-5)</label>
                                <input type="number" id="vendorRating" min="1" max="5" step="0.1" value="5" class="w-full px-3 py-2 text-sm rounded-lg border focus:ring-2 focus:ring-indigo-500">
                            </div>

                            <div class="md:col-span-2">
                                <label class="block text-xs font-semibold text-gray-600 mb-1">הערות / מידע נוסף</label>
                                <textarea id="vendorNotes" rows="2" class="w-full px-3 py-2 text-sm rounded-lg border focus:ring-2 focus:ring-indigo-500"></textarea>
                            </div>

                            <div class="md:col-span-2 flex justify-end gap-2">
                                <button type="button" onclick="resetForm()" class="px-4 py-2 text-sm bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">ביטול</button>
                                <button type="submit" class="px-4 py-2 text-sm bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg">שמור ספק</button>
                            </div>
                        </form>
                    </div>

                    <!-- טבלת ניהול ספקים נוחה ופרודקטיבית -->
                    <div class="glass p-5 rounded-2xl shadow-lg overflow-x-auto">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold text-gray-800">רשימת ספקים במערכת</h3>
                            <input type="text" id="adminSearchInput" oninput="renderAdminTable()" placeholder="חיפוש מהיר בטבלה..." class="px-3 py-1.5 text-xs rounded-lg border focus:ring-2 focus:ring-indigo-500 bg-white w-48">
                        </div>
                        
                        <table class="w-full text-right border-collapse">
                            <thead>
                                <tr class="border-b-2 border-gray-100 text-xs text-gray-500 uppercase tracking-wider">
                                    <th class="py-3 px-4 font-bold">שם הספק</th>
                                    <th class="py-3 px-4 font-bold">קטגוריה</th>
                                    <th class="py-3 px-4 font-bold">איש קשר וטלפון</th>
                                    <th class="py-3 px-4 font-bold">דירוג</th>
                                    <th class="py-3 px-4 font-bold text-center">פעולות</th>
                                </tr>
                            </thead>
                            <tbody id="adminTableBody" class="divide-y divide-gray-100 text-sm">
                                <!-- ייווצר דינמית -->
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script>
        // --- נתונים דיפולטיביים מובנים (כולל ספקי החברה הקיימים) ---
        const defaultCategories = [
            { id: "transport", name: "הובלות ולוגיסטיקה", active: true },
            { id: "tech", name: "טכנולוגיה ומחשוב", active: true },
            { id: "general", name: "שירותים כלליים ומשרד", active: true },
            { id: "construction", name: "בינוי ואחזקה", active: true }
        ];

        const defaultVendors = [
            {
                name: "א.ס. לב הובלה ואחסנה בע"מ",
                category: "transport",
                contact: "אבי לב",
                phone: "050-1234567",
                email: "avi@as-lev.co.il",
                rating: 4.8,
                notes: "ספק הובלות ראשי, אמינות גבוהה מאוד ומענה סביב השעון."
            },
            {
                name: "מיקוש מילן בע"מ",
                category: "general",
                contact: "רוני מילן",
                phone: "03-9876543",
                email: "office@milan-m.co.il",
                rating: 4.5,
                notes: "אספקת ציוד היקפי ומשרדי שוטף."
            },
            {
                name: "הום סנטר בע"מ",
                category: "construction",
                contact: "מחלקת עסקים",
                phone: "1-700-70-77-88",
                email: "b2b@homecenter.co.il",
                rating: 4.2,
                notes: "רכישת כלי עבודה וחומרי בניין באשראי עסקי."
            }
        ];

        // טעינה ראשונית מ-LocalStorage או שימוש בנתוני ברירת מחדל
        let categories = JSON.parse(localStorage.getItem('phonebook_categories')) || defaultCategories;
        let vendors = JSON.parse(localStorage.getItem('phonebook_vendors')) || defaultVendors;
        
        let currentFilterCategory = 'all';
        let isAdminView = false;

        // --- אתחול המערכת ---
        function init() {
            saveData();
            renderUserCategories();
            renderUserList();
            renderAdminCategories();
            renderAdminTable();
            populateCategoryDropdown();
            updateStats();
        }

        function saveData() {
            localStorage.setItem('phonebook_categories', JSON.stringify(categories));
            localStorage.setItem('phonebook_vendors', JSON.stringify(vendors));
        }

        // --- פונקציות מעבר ממשקים (מנהל/משתמש) ---
        function toggleView() {
            isAdminView = !isAdminView;
            const userView = document.getElementById('userView');
            const adminView = document.getElementById('adminView');
            const viewText = document.getElementById('viewText');
            const viewIcon = document.getElementById('viewIcon');

            if (isAdminView) {
                userView.classList.add('hidden');
                adminView.classList.remove('hidden');
                viewText.textContent = "מעבר לממשק משתמש קצה";
                viewIcon.className = "fa-solid fa-users text-lg";
                updateStats();
                renderAdminCategories();
                renderAdminTable();
                populateCategoryDropdown();
            } else {
                userView.classList.remove('hidden');
                adminView.classList.add('hidden');
                viewText.textContent = "מעבר לממשק מנהל";
                viewIcon.className = "fa-solid fa-user-gear text-lg";
                renderUserCategories();
                renderUserList();
            }
        }

        // --- פונקציות ניהול טופס ספקים ---
        function toggleAddForm() {
            const form = document.getElementById('vendorForm');
            const chevron = document.getElementById('formChevron');
            form.classList.toggle('hidden');
            chevron.classList.toggle('rotate-180');
        }

        function resetForm() {
            document.getElementById('vendorForm').reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('formTitle').textContent = "הוספת ספק חדש";
            document.getElementById('vendorForm').classList.add('hidden');
            document.getElementById('formChevron').classList.remove('rotate-180');
        }

        // --- טיפול בטופס (הוספה/עריכה) ---
        document.getElementById('vendorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editIndex = document.getElementById('editIndex').value;
            const vendorData = {
                name: document.getElementById('vendorName').value,
                category: document.getElementById('vendorCategory').value,
                contact: document.getElementById('vendorContact').value,
                phone: document.getElementById('vendorPhone').value,
                email: document.getElementById('vendorEmail').value,
                rating: parseFloat(document.getElementById('vendorRating').value) || 5,
                notes: document.getElementById('vendorNotes').value
            };

            if (editIndex !== '') {
                vendors[editIndex] = vendorData; // עדכון
            } else {
                vendors.push(vendorData); // יצירת חדש
            }

            saveData();
            resetForm();
            renderAdminTable();
            updateStats();
        });

        // --- ממשק מנהל: ניהול קטגוריות (הפעלה/השבתה) ---
        function renderAdminCategories() {
            const container = document.getElementById('adminCategoriesContainer');
            container.innerHTML = '';

            categories.forEach(cat => {
                const badgeColor = cat.active ? 'bg-emerald-100 text-emerald-800 border-emerald-300' : 'bg-rose-100 text-rose-800 border-rose-300';
                const statusText = cat.active ? 'פעיל (גלוי)' : 'לא פעיל (מוסתר)';
                const icon = cat.active ? 'fa-eye text-emerald-600' : 'fa-eye-slash text-rose-500';

                container.innerHTML += `
                    <div class="flex justify-between items-center p-2.5 rounded-lg border bg-white shadow-sm hover:shadow transition-all">
                        <span class="font-semibold text-sm text-gray-700">${cat.name}</span>
                        <div class="flex items-center gap-2">
                            <span class="text-xs px-2 py-0.5 rounded-full border ${badgeColor}">${statusText}</span>
                            <button onclick="toggleCategoryStatus('${cat.id}')" title="שנה סטטוס" class="p-1.5 hover:bg-gray-100 rounded transition-all">
                                <i class="fa-solid ${icon} text-sm"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function toggleCategoryStatus(catId) {
            const cat = categories.find(c => c.id === catId);
            if (cat) {
                cat.active = !cat.active;
                saveData();
                renderAdminCategories();
                updateStats();
            }
        }

        function addNewCategory() {
            const input = document.getElementById('newCategoryInput');
            const name = input.value.trim();
            if (!name) return;

            const id = 'cat_' + Date.now();
            categories.push({ id, name, active: true });
            input.value = '';
            saveData();
            renderAdminCategories();
            populateCategoryDropdown();
            updateStats();
        }

        function populateCategoryDropdown() {
            const dropdown = document.getElementById('vendorCategory');
            dropdown.innerHTML = '<option value="" disabled selected>בחר קטגוריה</option>';
            categories.forEach(cat => {
                dropdown.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            });
        }

        // --- ממשק מנהל: טבלת ספקים ---
        function renderAdminTable() {
            const tbody = document.getElementById('adminTableBody');
            const searchVal = document.getElementById('adminSearchInput').value.toLowerCase();
            tbody.innerHTML = '';

            vendors.forEach((vendor, index) => {
                if (searchVal && 
                    !vendor.name.toLowerCase().includes(searchVal) && 
                    !vendor.contact.toLowerCase().includes(searchVal) &&
                    !vendor.phone.includes(searchVal)) {
                    return;
                }

                const catObj = categories.find(c => c.id === vendor.category);
                const catName = catObj ? catObj.name : 'כללי';
                const catActive = catObj ? catObj.active : true;

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50/50 transition-all">
                        <td class="py-3 px-4 font-semibold text-gray-900">
                            ${vendor.name}
                        </td>
                        <td class="py-3 px-4">
                            <span class="text-xs px-2 py-1 rounded bg-gray-100 text-gray-600 border border-gray-200">
                                ${catName}
                                ${!catActive ? ' <span class="text-rose-500 font-bold">(קטגוריה מוסתרת)</span>' : ''}
                            </span>
                        </td>
                        <td class="py-3 px-4 text-xs">
                            <div class="font-bold text-gray-700">${vendor.contact || 'אין איש קשר'}</div>
                            <div class="text-gray-500">${vendor.phone}</div>
                        </td>
                        <td class="py-3 px-4 text-amber-500 font-bold">
                            ★ ${vendor.rating.toFixed(1)}
                        </td>
                        <td class="py-3 px-4">
                            <div class="flex justify-center gap-2">
                                <button onclick="editVendor(${index})" class="p-1 px-2.5 text-xs bg-indigo-50 text-indigo-700 hover:bg-indigo-100 rounded-md transition-all">
                                    <i class="fa-solid fa-pen-to-square"></i> ערוך
                                </button>
                                <button onclick="deleteVendor(${index})" class="p-1 px-2.5 text-xs bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-md transition-all">
                                    <i class="fa-solid fa-trash"></i> מחק
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        function editVendor(index) {
            const vendor = vendors[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('vendorName').value = vendor.name;
            document.getElementById('vendorCategory').value = vendor.category;
            document.getElementById('vendorContact').value = vendor.contact;
            document.getElementById('vendorPhone').value = vendor.phone;
            document.getElementById('vendorEmail').value = vendor.email;
            document.getElementById('vendorRating').value = vendor.rating;
            document.getElementById('vendorNotes').value = vendor.notes;

            document.getElementById('formTitle').textContent = "עריכת ספק: " + vendor.name;
            
            // גלילה למעלה ופתיחת הטופס
            const form = document.getElementById('vendorForm');
            form.classList.remove('hidden');
            document.getElementById('formChevron').classList.add('rotate-180');
            form.scrollIntoView({ behavior: 'smooth' });
        }

        function deleteVendor(index) {
            if (confirm("האם אתה בטוח שברצונך למחוק ספק זה?")) {
                vendors.splice(index, 1);
                saveData();
                renderAdminTable();
                updateStats();
            }
        }

        // עדכון סטטיסטיקות מהיר
        function updateStats() {
            document.getElementById('statTotalVendors').textContent = vendors.length;
            document.getElementById('statActiveCategories').textContent = categories.filter(c => c.active).length;
            
            const totalRatings = vendors.reduce((sum, v) => sum + v.rating, 0);
            const avg = vendors.length ? (totalRatings / vendors.length).toFixed(1) : "0.0";
            document.getElementById('statAvgRating').textContent = avg;
        }

        // --- ממשק משתמש קצה (User View) ---
        function renderUserCategories() {
            const container = document.getElementById('userCategoriesContainer');
            container.innerHTML = '';

            // מציגים אך ורק קטגוריות פעילות!
            const activeCats = categories.filter(c => c.active);

            // כפתור "הכל"
            const activeAllClass = currentFilterCategory === 'all' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white hover:bg-gray-100 text-gray-700';
            container.innerHTML += `
                <button onclick="setFilterCategory('all')" class="px-4 py-1.5 rounded-full text-sm font-semibold transition-all ${activeAllClass}">
                    הכל (${vendors.filter(v => categories.find(c => c.id === v.category)?.active).length})
                </button>
            `;

            activeCats.forEach(cat => {
                const count = vendors.filter(v => v.category === cat.id).length;
                const activeClass = currentFilterCategory === cat.id ? 'bg-indigo-600 text-white shadow-md' : 'bg-white hover:bg-gray-100 text-gray-700';
                
                container.innerHTML += `
                    <button onclick="setFilterCategory('${cat.id}')" class="px-4 py-1.5 rounded-full text-sm font-semibold transition-all ${activeClass}">
                        ${cat.name} (${count})
                    </button>
                `;
            });
        }

        function setFilterCategory(catId) {
            currentFilterCategory = catId;
            renderUserCategories();
            renderUserList();
        }

        function renderUserList() {
            const grid = document.getElementById('vendorsGrid');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';

            // יצירת רשימה של קטגוריות פעילות לבדיקת נראות מהירה
            const activeCategoryIds = categories.filter(c => c.active).map(c => c.id);

            vendors.forEach(vendor => {
                // בדיקת סינון לפי קטגוריה וגם בדיקה שהקטגוריה עצמה פעילה!
                if (!activeCategoryIds.includes(vendor.category)) return; // לא מציגים אם קטגוריה כבויה
                if (currentFilterCategory !== 'all' && vendor.category !== currentFilterCategory) return;

                // חיפוש חופשי
                if (searchVal && 
                    !vendor.name.toLowerCase().includes(searchVal) && 
                    !vendor.contact.toLowerCase().includes(searchVal) && 
                    !vendor.notes.toLowerCase().includes(searchVal)) {
                    return;
                }

                // יצירת כוכבים לדירוג
                let starsHTML = '';
                const rating = Math.round(vendor.rating);
                for (let i = 1; i <= 5; i++) {
                    starsHTML += i <= rating 
                        ? '<i class="fa-solid fa-star text-amber-400"></i>' 
                        : '<i class="fa-regular fa-star text-gray-300"></i>';
                }

                const catName = categories.find(c => c.id === vendor.category)?.name || 'כללי';

                grid.innerHTML += `
                    <div class="glass p-6 rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 border border-white flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-xs font-bold px-2.5 py-1 rounded-full bg-indigo-100 text-indigo-700">${catName}</span>
                                <div class="flex text-sm">${starsHTML}</div>
                            </div>
                            <h4 class="text-xl font-bold text-indigo-950 mb-2">${vendor.name}</h4>
                            <p class="text-gray-600 text-sm mb-4 line-clamp-2">${vendor.notes || 'אין הערות נוספות עבור ספק זה.'}</p>
                        </div>
                        
                        <div class="border-t pt-4 space-y-3">
                            <div class="flex items-center justify-between text-sm text-gray-700">
                                <span class="flex items-center gap-2">
                                    <i class="fa-solid fa-user text-gray-400"></i>
                                    ${vendor.contact || 'אין איש קשר מוגדר'}
                                </span>
                                ${vendor.email ? `
                                <a href="mailto:${vendor.email}" class="text-indigo-600 hover:underline flex items-center gap-1" title="${vendor.email}">
                                    <i class="fa-solid fa-envelope"></i> שלח מייל
                                </a>` : ''}
                            </div>
                            
                            <!-- כפתור חיוג מהיר / יצירת קשר -->
                            <a href="tel:${vendor.phone}" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-4 rounded-xl font-semibold flex items-center justify-center gap-2 transition-all shadow-sm">
                                <i class="fa-solid fa-phone"></i>
                                התקשר: ${vendor.phone}
                            </a>
                        </div>
                    </div>
                `;
            });

            if (grid.children.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 glass rounded-2xl text-gray-500">
                        <i class="fa-solid fa-folder-open text-4xl mb-3 text-gray-400"></i>
                        <p>לא נמצאו ספקים תחת הסינון או החיפוש הנוכחי.</p>
                    </div>
                `;
            }
        }

        // הפעלה ראשונית של המערכת
        window.onload = init;
    </script>
</body>
</html>
