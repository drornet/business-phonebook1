<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספר טלפונים עסקי - ניהול מתקדם</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome לאייקונים -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- סרגל ניווט עליון מהיר -->
    <nav class="bg-white shadow-sm border-b border-gray-200 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 flex items-center gap-2">
                <i class="fa-solid fa-address-book"></i>
                <span>ספר טלפונים ארגוני</span>
            </h1>
            <div class="flex gap-2">
                <button onclick="switchView('user')" id="btn-user-view" class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white shadow">
                    <i class="fa-solid fa-users ml-1"></i> תצוגת משתמשים
                </button>
                <button onclick="switchView('admin')" id="btn-admin-view" class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200">
                    <i class="fa-solid fa-user-shield ml-1"></i> לוח מנהל (Admin)
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <!-- ================= תצוגת משתמש רגיל ================= -->
        <section id="user-view" class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold mb-4">חיפוש מהיר</h2>
                <input type="text" id="user-search" oninput="renderUserDirectory()" placeholder="חפש עובד, תפקיד או קטגוריה..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- רשימת אנשי קשר לפי קטגוריות פעילות בלבד -->
            <div id="user-directory-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- יתמלא דינמית על ידי JS -->
            </div>
        </section>

        <!-- ================= תצוגת מנהל משודרגת (Admin Dashboard) ================= -->
        <section id="admin-view" class="hidden space-y-8">
            <!-- כותרת וסטטיסטיקה מהירה -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-gradient-to-r from-blue-700 to-indigo-800 text-white p-6 rounded-2xl shadow-md">
                <div>
                    <h2 class="text-2xl font-bold">לוח בקרה וניהול</h2>
                    <p class="text-blue-100 text-sm mt-1">נהל קטגוריות, הרשאות צפייה ואנשי קשר בצורה מהירה</p>
                </div>
                <div class="flex gap-4">
                    <div class="bg-white/10 px-4 py-2 rounded-lg text-center">
                        <span class="block text-xs text-blue-200">סה"כ קטגוריות</span>
                        <span id="stats-total-cats" class="text-xl font-bold">0</span>
                    </div>
                    <div class="bg-white/10 px-4 py-2 rounded-lg text-center">
                        <span class="block text-xs text-blue-200">פעילות</span>
                        <span id="stats-active-cats" class="text-xl font-bold text-green-300">0</span>
                    </div>
                </div>
            </div>

            <!-- אזור ניהול קטגוריות (פרודוקטיבי ומהיר) -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-lg font-bold text-gray-900">קטגוריות והרשאות תצוגה</h3>
                        <p class="text-sm text-gray-500">לחיצה על כפתור הסטטוס תסתיר או תציג את הקטגוריה ואנשי הקשר שבה מהמשתמשים.</p>
                    </div>
                    <!-- הוספת קטגוריה מהירה inline -->
                    <div class="flex gap-2">
                        <input type="text" id="new-cat-input" placeholder="שם קטגוריה חדשה..." class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                        <button onclick="addCategory()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                            <i class="fa-solid fa-plus"></i> הוספה
                        </button>
                    </div>
                </div>

                <!-- טבלת ניהול קטגוריות מהירה -->
                <div class="overflow-x-auto">
                    <table class="w-full text-right border-collapse">
                        <thead>
                            <tr class="border-b border-gray-200 bg-gray-50 text-sm text-gray-500 font-semibold">
                                <th class="p-3">שם הקטגוריה</th>
                                <th class="p-3 text-center">סטטוס צפייה</th>
                                <th class="p-3 text-center">כמות אנשי קשר</th>
                                <th class="p-3 text-left">פעולות</th>
                            </tr>
                        </thead>
                        <tbody id="admin-categories-table">
                            <!-- יתמלא דינמית על ידי JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <script>
        // נתוני דמו התחלתיים
        let categories = [
            { id: 1, name: "הנהלה", active: true },
            { id: 2, name: "פיתוח ותוכנה", active: true },
            { id: 3, name: "משאבי אנוש", active: false } // כבוי כברירת מחדל להדגמה
        ];

        let contacts = [
            { id: 101, name: "ישראל ישראלי", role: "מנכ\"ל", phone: "050-1234567", catId: 1 },
            { id: 102, name: "שירה כהן", role: "סמנכ\"ל כספים", phone: "050-7654321", catId: 1 },
            { id: 103, name: "דניאל לוי", role: "מפתח Fullstack", phone: "052-5556667", catId: 2 },
            { id: 104, name: "נועה אברהם", role: "מנהלת גיוס", phone: "054-9998887", catId: 3 }
        ];

        // מעבר בין מסכים
        function switchView(view) {
            const userView = document.getElementById('user-view');
            const adminView = document.getElementById('admin-view');
            const btnUser = document.getElementById('btn-user-view');
            const btnAdmin = document.getElementById('btn-admin-view');

            if (view === 'user') {
                userView.classList.remove('hidden');
                adminView.classList.add('hidden');
                btnUser.className = "px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white shadow";
                btnAdmin.className = "px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200";
                renderUserDirectory();
            } else {
                userView.classList.add('hidden');
                adminView.classList.remove('hidden');
                btnUser.className = "px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200";
                btnAdmin.className = "px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white shadow";
                renderAdminDashboard();
            }
        }

        // --- תצוגת משתמש רגיל ---
        function renderUserDirectory() {
            const container = document.getElementById('user-directory-container');
            const searchQuery = document.getElementById('user-search').value.toLowerCase();
            container.innerHTML = "";

            // מסננים רק קטגוריות פעילות
            const activeCategories = categories.filter(cat => cat.active);

            activeCategories.forEach(cat => {
                // מוצאים את אנשי הקשר השייכים לקטגוריה הזו שתואמים לחיפוש
                const catContacts = contacts.filter(contact => {
                    if (contact.catId !== cat.id) return false;
                    return contact.name.toLowerCase().includes(searchQuery) || 
                           contact.role.toLowerCase().includes(searchQuery) ||
                           contact.phone.includes(searchQuery);
                });

                // אם יש אנשי קשר או שאין חיפוש פעיל - נציג את הקטגוריה
                if (catContacts.length > 0 || searchQuery === "") {
                    const catDiv = document.createElement('div');
                    catDiv.className = "bg-white p-5 rounded-xl shadow-sm border border-gray-200 space-y-4";
                    
                    catDiv.innerHTML = `
                        <h3 class="text-lg font-bold text-blue-800 border-b pb-2 flex justify-between items-center">
                            <span>${cat.name}</span>
                            <span class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded">${catContacts.length} עובדים</span>
                        </h3>
                        <div class="space-y-3">
                            ${catContacts.map(c => `
                                <div class="flex justify-between items-center p-2 rounded-lg hover:bg-gray-50 transition">
                                    <div>
                                        <div class="font-semibold text-gray-900">${c.name}</div>
                                        <div class="text-xs text-gray-500">${c.role}</div>
                                    </div>
                                    <a href="tel:${c.phone}" class="flex items-center gap-2 text-sm text-blue-600 font-semibold hover:underline">
                                        <i class="fa-solid fa-phone text-xs"></i> ${c.phone}
                                    </a>
                                </div>
                            `).join('')}
                            ${catContacts.length === 0 ? '<p class="text-sm text-gray-400 italic">אין אנשי קשר בקטגוריה זו</p>' : ''}
                        </div>
                    `;
                    container.appendChild(catDiv);
                }
            });
        }

        // --- תצוגת מנהל משודרגת ---
        function renderAdminDashboard() {
            const tbody = document.getElementById('admin-categories-table');
            tbody.innerHTML = "";

            // עדכון סטטיסטיקה
            document.getElementById('stats-total-cats').innerText = categories.length;
            document.getElementById('stats-active-cats').innerText = categories.filter(c => c.active).length;

            categories.forEach(cat => {
                const count = contacts.filter(c => c.catId === cat.id).length;
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-100 hover:bg-gray-50 transition text-sm";

                tr.innerHTML = `
                    <td class="p-3 font-semibold text-gray-800">${cat.name}</td>
                    <td class="p-3 text-center">
                        <button onclick="toggleCategoryStatus(${cat.id})" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium transition cursor-pointer ${
                            cat.active 
                            ? 'bg-green-100 text-green-800 hover:bg-green-200' 
                            : 'bg-red-100 text-red-800 hover:bg-red-200'
                        }">
                            <span class="h-2 w-2 rounded-full ${cat.active ? 'bg-green-500' : 'bg-red-500'}"></span>
                            ${cat.active ? 'פעיל (גלוי למשתמש)' : 'לא פעיל (מוסתר)'}
                        </button>
                    </td>
                    <td class="p-3 text-center text-gray-500">${count}</td>
                    <td class="p-3 text-left">
                        <button onclick="deleteCategory(${cat.id})" class="text-red-500 hover:text-red-700 text-xs font-semibold px-2 py-1 rounded hover:bg-red-50 transition">
                            <i class="fa-solid fa-trash-can"></i> מחק קטגוריה
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // שינוי סטטוס קטגוריה (פעיל/לא פעיל)
        function toggleCategoryStatus(id) {
            const cat = categories.find(c => c.id === id);
            if (cat) {
                cat.active = !cat.active;
                renderAdminDashboard();
            }
        }

        // הוספת קטגוריה חדשה מהירה
        function addCategory() {
            const input = document.getElementById('new-cat-input');
            const name = input.value.trim();
            if (!name) return;

            const newId = categories.length ? Math.max(...categories.map(c => c.id)) + 1 : 1;
            categories.push({ id: newId, name: name, active: true });
            input.value = "";
            renderAdminDashboard();
        }

        // מחיקת קטגוריה
        function deleteCategory(id) {
            if (confirm("האם אתה בטוח שברצונך למחוק קטגוריה זו? אנשי הקשר המשויכים אליה לא יימחקו אך לא ישוייכו יותר.")) {
                categories = categories.filter(c => c.id !== id);
                renderAdminDashboard();
            }
        }

        // טעינה ראשונית
        window.onload = () => {
            renderUserDirectory();
        };
    </script>
</body>
</html>
