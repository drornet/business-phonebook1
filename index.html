<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול ספקים מתקדמת</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --panel-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --border-color: #e5e7eb;
            --accent-color: #f59e0b;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Assistant', sans-serif;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header & Dark Mode Toggle */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .theme-toggle-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: var(--shadow);
            font-weight: 600;
        }

        /* Dashboard Section */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-info h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .stat-info p {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-icon {
            font-size: 2.2rem;
            color: var(--text-muted);
            opacity: 0.3;
        }

        /* Notice Board Section */
        .notice-board {
            background: #fffbeb;
            border: 1px solid #fef3c7;
            border-right: 5px solid var(--accent-color);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        [data-theme="dark"] .notice-board {
            background: #78350f;
            border-color: #92400e;
            color: #fef3c7;
        }

        /* Main Workspace split Grid */
        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }

        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .sidebar-panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        /* Forms & Inputs */
        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            border-radius: 6px;
        }

        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            background: var(--primary-color);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 5px;
        }

        .btn:hover { background: var(--primary-hover); }

        /* Filters and Suppliers Output Area */
        .content-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .filters-bar {
            background: var(--panel-bg);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .supplier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }

        @media (max-width: 600px) {
            .supplier-grid { grid-template-columns: 1fr; }
        }

        /* Supplier Card Details styling */
        .supplier-card {
            background: var(--panel-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 20px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .supplier-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .supplier-title h2 {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .supplier-category {
            font-size: 0.8rem;
            background: var(--bg-color);
            padding: 3px 8px;
            border-radius: 4px;
            color: var(--text-muted);
        }

        /* Action triggers */
        .quick-actions {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .action-link {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .action-link.call { background-color: #3b82f6; }
        .action-link.wa { background-color: #25d366; }
        .action-link.waze { background-color: #33bfff; }

        /* Multi contacts & Reminders subsections */
        .sub-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border-color);
        }

        .sub-section-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .contact-pill {
            background: var(--bg-color);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .task-item {
            background: #fee2e2;
            color: #991b1b;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        [data-theme="dark"] .task-item {
            background: #991b1b;
            color: #fee2e2;
        }

        /* Logs (Audit Log) Area */
        .logs-container {
            margin-top: 25px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            max-height: 200px;
            overflow-y: auto;
        }

        .log-row {
            font-size: 0.8rem;
            padding: 5px 0;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- 9. מצב כהה (Dark Mode Toggle) במקביל לכותרת הכללית -->
    <header>
        <div>
            <h1>מערכת ניהול ספקים ארגונית</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">פלטפורמה מאוחדת לניהול, תזכורות ומעקב</p>
        </div>
        <button class="theme-toggle-btn" onclick="toggleTheme()">
            <i class="fa-solid fa-moon"></i> מצב כהה/בהיר
        </button>
    </header>

    <!-- 2. לוח מודעות והתראות מערכת ממנהלים -->
    <div class="notice-board" id="noticeBoard">
        <div>
            <i class="fa-solid fa-bullhorn" style="margin-left: 10px;"></i>
            <strong>הודעת מערכת:</strong> <span id="noticeText">שימו לב, יש לרענן מסמכי ביטוח ואישורי ניהול ספרים פגים לכל ספקי המחשוב החודש.</span>
        </div>
        <button onclick="updateNotice()" style="background:none; border:1px solid var(--text-muted); padding:3px 8px; border-radius:4px; cursor:pointer; font-size:0.75rem;">עדכן הודעה</button>
    </div>

    <!-- 4. דשבורד סטטיסטיקות בעמוד הבית -->
    <div class="dashboard-grid">
        <div class="stat-card">
            <div class="stat-info">
                <h3>סך הכל ספקים</h3>
                <p id="statTotal">0</p>
            </div>
            <i class="fa-solid fa-truck-field stat-icon"></i>
        </div>
        <div class="stat-card">
            <div class="stat-info">
                <h3>ספקים ללא ביקורת</h3>
                <p id="statNoReview">0</p>
            </div>
            <i class="fa-solid fa-comment-slash stat-icon"></i>
        </div>
        <div class="stat-card">
            <div class="stat-info">
                <h3>משימות פתוחות</h3>
                <p id="statTasks">0</p>
            </div>
            <i class="fa-solid fa-clock stat-icon"></i>
        </div>
    </div>

    <!-- Main Workspace Split Grid -->
    <div class="main-layout">
        
        <!-- Sidebar - Inputs Forms -->
        <div class="sidebar-panel">
            <div class="panel-title">
                <i class="fa-solid fa-user-plus"></i> הוספת ספק חדש
            </div>
            <form id="supplierForm" onsubmit="addSupplier(event)">
                <div class="form-group">
                    <label>שם הספק</label>
                    <input type="text" id="supName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>קטגוריה</label>
                    <select id="supCategory" class="form-control">
                        <option value="מזון והסעדה">מזון והסעדה</option>
                        <option value="מחשוב וטכנולוגיה">מחשוב וטכנולוגיה</option>
                        <option value="אחזקה ולוגיסטיקה">אחזקה ולוגיסטיקה</option>
                        <option value="הדרכה וחינוך">הדרכה וחינוך</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>טלפון ראשי</label>
                    <input type="tel" id="supPhone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>עיר / כתובת למפתחות ניווט</label>
                    <input type="text" id="supCity" class="form-control" placeholder="למשל: תל אביב">
                </div>
                <div class="form-group">
                    <label>דירוג (1-5 כוכבים)</label>
                    <select id="supRating" class="form-control">
                        <option value="0">ללא ביקורת</option>
                        <option value="1">1 כוכב</option>
                        <option value="2">2 כוכבים</option>
                        <option value="3">3 כוכבים</option>
                        <option value="4">4 כוכבים</option>
                        <option value="5">5 כוכבים</option>
                    </select>
                </div>
                
                <!-- 8. קישורים למסמכי ספק חיצוניים -->
                <div class="form-group">
                    <label>קישור למסמך חיצוני (Drive / Dropbox)</label>
                    <input type="url" id="supDocUrl" class="form-control" placeholder="https://drive.google.com/...">
                </div>

                <!-- 6. אנשי קשר מרובים לכל ספק (הזנה ראשונית של שניים אופציונליים) -->
                <div class="form-group" style="background: var(--bg-color); padding: 8px; border-radius: 6px; margin-top: 10px;">
                    <label style="color: var(--primary-color);">אנשי קשר נוספים (אופציונלי)</label>
                    <input type="text" id="contactName1" class="form-control" placeholder="שם איש קשר נוסף" style="margin-bottom: 5px;">
                    <input type="tel" id="contactPhone1" class="form-control" placeholder="טלפון נוסף">
                </div>

                <button type="submit" class="btn">שמור ספק במערכת</button>
            </form>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            
            <!-- 5. סינונים חכמים (לפי דירוג/ספקים ללא ביקורת וחיפוש חופשי) -->
            <div class="filters-bar">
                <div style="flex: 1; min-width: 200px;">
                    <input type="text" id="searchBar" class="form-control" placeholder="חיפוש מהיר לפי שם ספק..." oninput="render()">
                </div>
                <div>
                    <select id="filterRating" class="form-control" onchange="render()">
                        <option value="all">כל רמות הדירוג</option>
                        <option value="high">מצטיינים (4 כוכבים ומעלה)</option>
                        <option value="none">ללא ביקורת בלבד</option>
                    </select>
                </div>
            </div>

            <!-- Suppliers Grid -->
            <div class="supplier-grid" id="supplierGrid"></div>
        </div>
    </div>

    <!-- 3. יומן מעקב שינויים (Audit Log) -->
    <div class="logs-container">
        <div class="panel-title" style="font-size:0.95rem; margin-bottom:10px;">
            <i class="fa-solid fa-clock-rotate-left"></i> יומן מעקב שינויים ופעולות מערכת (Audit Log)
        </div>
        <div id="logRows"></div>
    </div>
</div>

<script>
    // אתחול משתנים מקומיים או משיכה מ-LocalStorage לשמירה תמידית
    let suppliers = JSON.parse(localStorage.getItem('suppliers')) || [];
    let logs = JSON.parse(localStorage.getItem('logs')) || [];
    let systemNotice = localStorage.getItem('systemNotice') || "שימו לב, יש לרענן מסמכי ביטוח ואישורי ניהול ספרים פגים לכל ספקי המחשוב החודש.";

    // 9. פונקציית שינוי תצוגה - Dark Mode
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }

    // טעינת הגדרת תצוגה שמורה
    if(localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }

    // 2. עדכון ידני של הודעת המערכת
    function updateNotice() {
        const newNotice = prompt("הזן הודעת מערכת חדשה עבור המשתמשים:", systemNotice);
        if (newNotice !== null && newNotice.trim() !== "") {
            systemNotice = newNotice;
            localStorage.setItem('systemNotice', systemNotice);
            document.getElementById('noticeText').innerText = systemNotice;
            addLog(`עדכון הודעת מערכת ל: "${systemNotice}"`);
        }
    }

    // 3. הוספת רשומה ליומן מעקב השינויים
    function addLog(actionText) {
        const now = new Date();
        const timeStr = `${now.toLocaleDateString('he-IL')} ${now.toLocaleTimeString('he-IL')}`;
        logs.unshift({ time: timeStr, text: actionText });
        if(logs.length > 30) logs.pop(); // שמירה על 30 רשומות אחרונות בלבד שלא יכביד
        localStorage.setItem('logs', JSON.stringify(logs));
        renderLogs();
    }

    function renderLogs() {
        const logContainer = document.getElementById('logRows');
        logContainer.innerHTML = logs.map(l => `<div class="log-row">[${l.time}] ${l.text}</div>`).join('');
    }

    // הוספת ספק חדש
    function addSupplier(e) {
        e.preventDefault();
        
        const name = document.getElementById('supName').value;
        const category = document.getElementById('supCategory').value;
        const phone = document.getElementById('supPhone').value;
        const city = document.getElementById('supCity').value;
        const rating = parseInt(document.getElementById('supRating').value);
        const docUrl = document.getElementById('supDocUrl').value;
        
        // 6. אנשי קשר מרובים - יצירת מערך
        const extraContacts = [];
        const cName = document.getElementById('contactName1').value;
        const cPhone = document.getElementById('contactPhone1').value;
        if(cName && cPhone) {
            extraContacts.push({ name: cName, phone: cPhone });
        }

        const newSupplier = {
            id: Date.now(),
            name,
            category,
            phone,
            city,
            rating,
            docUrl,
            contacts: extraContacts,
            tasks: [] // 7. מערכת משימות לכל ספק בנפרד
        };

        suppliers.push(newSupplier);
        localStorage.setItem('suppliers', JSON.stringify(suppliers));
        
        addLog(`נוסף ספק חדש: ${name} (קטגוריית ${category})`);
        
        document.getElementById('supplierForm').reset();
        render();
    }

    // 7. הוספת משימה/תזכורת לספק ספציפי
    function addTask(supplierId) {
        const taskText = prompt("הזן משימה או תזכורת המשך (למשל: 'להתקשר לחדש חוזה בסוף החודש'):");
        if(taskText && taskText.trim() !== "") {
            const sup = suppliers.find(s => s.id === supplierId);
            if(sup) {
                sup.tasks.push({ id: Date.now(), text: taskText });
                localStorage.setItem('suppliers', JSON.stringify(suppliers));
                addLog(`נוספה תזכורת לספק ${sup.name}: "${taskText}"`);
                render();
            }
        }
    }

    // הסרת משימה שבוצעה
    function removeTask(supplierId, taskId) {
        const sup = suppliers.find(s => s.id === supplierId);
        if(sup) {
            sup.tasks = sup.tasks.filter(t => t.id !== taskId);
            localStorage.setItem('suppliers', JSON.stringify(suppliers));
            addLog(`משימה סומנה כבוצעה עבור ספק ${sup.name}`);
            render();
        }
    }

    // מחיקת ספק
    function deleteSupplier(id, name) {
        if(confirm(`האם אתה בטוח שברצונך למחוק את הספק ${name}?`)) {
            suppliers = suppliers.filter(s => s.id !== id);
            localStorage.setItem('suppliers', JSON.stringify(suppliers));
            addLog(`נמחק ספק מהמערכת: ${name}`);
            render();
        }
    }

    // פונקציית הרינדור והחישוב הראשית
    function render() {
        const searchVal = document.getElementById('searchBar').value.toLowerCase();
        const filterRating = document.getElementById('filterRating').value;
        const grid = document.getElementById('supplierGrid');
        
        // סינון רשימה
        let filtered = suppliers.filter(s => {
            const matchesSearch = s.name.toLowerCase().includes(searchVal);
            
            // 5. לוגיקת סינונים חכמים
            let matchesRating = true;
            if(filterRating === 'high') matchesRating = s.rating >= 4;
            else if(filterRating === 'none') matchesRating = s.rating === 0;
            
            return matchesSearch && matchesRating;
        });

        // 4. עדכון דשבורד סטטיסטיקות בזמן אמת
        document.getElementById('statTotal').innerText = suppliers.length;
        document.getElementById('statNoReview').innerText = suppliers.filter(s => s.rating === 0).length;
        document.getElementById('statTasks').innerText = suppliers.reduce((acc, s) => acc + s.tasks.length, 0);
        document.getElementById('noticeText').innerText = systemNotice;

        // בניית כרטיסי הספקים
        grid.innerHTML = filtered.map(s => {
            // הכנת כוכבי הדירוג ויזואלית
            const stars = s.rating === 0 ? 'ללא ביקורת' : '⭐'.repeat(s.rating);
            
            // 6. הפקת רשימת אנשי קשר נוספים
            const contactsHtml = s.contacts.map(c => `
                <div class="contact-pill">
                    <span><strong>${c.name}:</strong> ${c.phone}</span>
                    <a href="https://wa.me/972${c.phone.replace(/^0/, '')}" target="_blank" style="color:#25d366;"><i class="fa-brands fa-whatsapp"></i></a>
                </div>
            `).join('');

            // 7. הפקת רשימת משימות פתוחות
            const tasksHtml = s.tasks.map(t => `
                <div class="task-item">
                    <span><i class="fa-regular fa-bell"></i> ${t.text}</span>
                    <i class="fa-solid fa-check" style="cursor:pointer;" title="סמן כבוצע" onclick="removeTask(${s.id}, ${t.id})"></i>
                </div>
            `).join('');

            // 8. קישור למסמך חיצוני
            const docHtml = s.docUrl ? `
                <div class="sub-section">
                    <div class="sub-section-title">תיק מסמכים ונספחים</div>
                    <a href="${s.docUrl}" target="_blank" style="color:var(--primary-color); font-size:0.85rem; text-decoration:none;">
                        <i class="fa-solid fa-file-lines"></i> פתח תיק ספק ב-Drive / ענן externo
                    </a>
                </div>
            ` : '';

            return `
                <div class="supplier-card">
                    <div class="supplier-header">
                        <div class="supplier-title">
                            <h2>${s.name}</h2>
                            <span class="supplier-category">${s.category}</span>
                        </div>
                        <div style="text-align: left;">
                            <div style="font-size: 0.9rem; margin-bottom:5px;">${stars}</div>
                            <button onclick="deleteSupplier(${s.id}, '${s.name}')" style="background:none; border:none; color:var(--danger-color); cursor:pointer;"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>

                    <!-- 1. לחצני פעולה מהירה מובנים מותאמי מובייל/מחשב -->
                    <div class="quick-actions">
                        <a href="tel:${s.phone}" class="action-link call">
                            <i class="fa-solid fa-phone"></i> חיוג
                        </a>
                        <a href="https://wa.me/972${s.phone.replace(/^0/, '')}?text=${encodeURIComponent('שלום, פונה אליך לגבי תיאום עבודה.')}" target="_blank" class="action-link wa">
                            <i class="fa-brands fa-whatsapp"></i> WhatsApp
                        </a>
                        <a href="https://waze.com/ul?q=${encodeURIComponent(s.city || 'ישראל')}" target="_blank" class="action-link waze">
                            <i class="fa-brands fa-waze"></i> ניווט Waze
                        </a>
                    </div>

                    <div style="font-size:0.85rem; margin-bottom:5px;">
                        <strong>טלפון ראשי:</strong> ${s.phone} | <strong>מיקום:</strong> ${s.city || 'לא הוגדר'}
                    </div>

                    <!-- הצגת אנשי הקשר המרובים -->
                    ${s.contacts.length > 0 ? `
                        <div class="sub-section">
                            <div class="sub-section-title">אנשי קשר משניים</div>
                            ${contactsHtml}
                        </div>
                    ` : ''}

                    <!-- הצגת נספחים / קבצים חיצוניים -->
                    ${docHtml}

                    <!-- הצגת משימות פתוחות ותוספת משימה -->
                    <div class="sub-section">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                            <span class="sub-section-title">משימות ותזכורות מעקב</span>
                            <button onclick="addTask(${s.id})" style="background:none; border:none; color:var(--primary-color); cursor:pointer; font-size:0.8rem; font-weight:600;">+ הוסף משימה</button>
                        </div>
                        ${tasksHtml || '<p style="font-size:0.8rem; color:var(--text-muted); italic;">אין משימות פתוחות לספק זה.</p>'}
                    </div>
                </div>
            `;
        }).join('');
    }

    // הרצה ראשונית של הדף וטעינת הלוגים
    render();
    renderLogs();
</script>

</body>
</html>
