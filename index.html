<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פורטל ספקים - דרור חינוך</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: rgb(245, 249, 255);
            --text: #333333;
            --text-muted: #666666;
            --primary: #1a73e8;
            --border: #dadce0;
            --danger: #d93025;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .login-card h2 {
            color: var(--primary);
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .login-card p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right; /* שומר על כל התוויות בצד ימין */
            width: 100%;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            text-align: right;
            transition: border-color 0.2s;
        }

        .form-group input[type="text"]:focus,
        .password-container input:focus {
            border-color: var(--primary);
        }

        /* תיקון מיכל הסיסמה והאייקון */
        .password-container {
            position: relative;
            width: 100%;
            display: block;
        }

        /* מבטיח ששדה הסיסמה ייראה בדיוק כמו שדה שם המשתמש */
        .password-container input {
            width: 100%;
            padding: 12px 12px 12px 40px; /* מרווח משמאל בשביל האייקון של העין */
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            text-align: right;
            transition: border-color 0.2s;
        }

        /* מיקום מדויק לאייקון העין בצד שמאל של השדה */
        .toggle-password-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
            z-index: 10;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #1557b0;
        }
    </style>
</head>
<body>

    <div class="login-wrapper" id="loginWrapper">
        <div class="login-card">
            <i class="fa-solid fa-shield-halved" style="font-size: 45px; color: var(--primary); margin-bottom: 15px;"></i>
            
            <h2>פורタル ספקים - דרור חינוך</h2>
            <p>יש להקליד את השם המלא והסיסמה האישית שלך</p>
            
            <div id="loginStatusText" style="color:var(--danger); font-size:13px; margin-bottom:10px; font-weight:bold;"></div>
            
            <div class="form-group">
                <label>שם מלא</label>
                <input type="text" id="loginUsername" placeholder="לדוגמה: אביב שטרית">
            </div>
            
            <div class="form-group">
                <label>סיסמה אישית</label>
                <div class="password-container">
                    <input type="password" id="loginPassword" placeholder="••••••••">
                    <i class="fa-solid fa-eye toggle-password-icon" id="togglePasswordBtn" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>
            
            <button class="action-btn" onclick="handleLogin()">התחבר למערכת</button>
        </div>
    </div>

    <script>
        // פונקציה להצגה והסתרה של הסיסמה
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('loginPassword');
            const toggleIcon = document.getElementById('togglePasswordBtn');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // פונקציית ההתחברות שלך (תוסיף כאן את הלוגיקה במידת הצורך)
        function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const pass = document.getElementById('loginPassword').value;
            const statusText = document.getElementById('loginStatusText');

            if (!username || !pass) {
                statusText.innerText = "נא למלא את כל השדות";
                return;
            }
            
            statusText.innerText = "";
            alert("מנסה להתחבר עבור: " + username);
        }
    </script>

</body>
</html>
