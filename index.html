<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ספקים - דרור חינוך</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; text-align: center; }
        
        /* בדיקה ויזואלית */
        .debug-banner { background: var(--danger); color: white; padding: 10px; font-weight: bold; margin-bottom: 20px; border-radius: 8px; }
        
        .login-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; margin: 50px auto; border-top: 5px solid var(--primary); }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-size: 14px; text-align: right; }
        
        .password-container { position: relative; width: 100%; }
        .password-container input { padding-left: 40px; }
        .toggle-password-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #64748b; font-size: 16px; padding: 5px; z-index: 100; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-msg { color: var(--danger); font-size: 14px; margin-bottom: 10px; font-weight: bold; }
        
        .app-container { display: none; margin-top: 30px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="debug-banner">גרסה 2.0 - אם אתה רואה את זה, הקוד התעדכן בהצלחה!</div>

    <div id="loginWrapper">
        <div class="login-card">
            <h2 style="color: var(--primary); margin-bottom: 20px;">פורטל ספקים - התחברות</h2>
            <div id="loginStatusText" class="error-msg"></div>
            
            <div class="form-group">
                <label>שם מלא</label>
                <input type="text" id="loginUsername" value="אביב שטרית" placeholder="שם מלא">
            </div>
            
            <div class="form-group">
                <label>סיסמה אישית</label>
                <div class="password-container">
                    <input type="password" id="loginPassword" value="Dror2026!" placeholder="••••••••">
                    <button id="togglePasswordBtn" type="button" class="toggle-password-icon" style="background:none; border:none; font-size:18px;">👁️</button>
                </div>
            </div>
            
            <button id="submitLoginBtn" class="btn" type="button">התחבר למערכת</button>
        </div>
    </div>

    <div id="mainAppContainer" class="app-container">
        <h1 style="color: green;">🎉 הצלחת להיכנס למערכת!</h1>
        <p style="margin-top: 10px;">שלום, <span id="lblUserName"></span></p>
        <button id="logoutBtn" class="btn" style="background:#64748b; max-width: 150px; margin-top:20px;">התנתק</button>
    </div>

<script>
    // הגדרה בסיסית ונקייה של המשתמשים
    const systemUsers = [
        { "שם מלא": "אביב שטרית", "סיסמה": "Dror2026!", "הרשאה": "מנהל" }
    ];

    // פונקציית שינוי תצוגת סיסמה
    function togglePassword() {
        const passInput = document.getElementById('loginPassword');
        const btn = document.getElementById('togglePasswordBtn');
        if (!passInput) return;
        
        if (passInput.type === 'password') {
            passInput.type = 'text';
            btn.innerText = '🔒';
        } else {
            passInput.type = 'password';
            btn.innerText = '👁️';
        }
    }

    // פונקציית התחברות
    function doLogin() {
        const userIn = document.getElementById('loginUsername').value.trim();
        const passIn = document.getElementById('loginPassword').value.trim();
        const errLbl = document.getElementById('loginStatusText');

        const found = systemUsers.find(u => u['שם מלא'] === userIn && u['סיסמה'] === passIn);
        
        if (found) {
            document.getElementById('loginWrapper').style.display = 'none';
            document.getElementById('mainAppContainer').style.display = 'block';
            document.getElementById('lblUserName').innerText = found['שם מלא'];
            if(errLbl) errLbl.innerText = "";
        } else {
            if(errLbl) errLbl.innerText = "שם משתמש או סיסמה שגויים!";
        }
    }

    // חיבור האזנות לאיוונטים בצורה ישנה ובטוחה שנתמכת בכל דפדפן
    window.onload = function() {
        const eye = document.getElementById('togglePasswordBtn');
        if(eye) { eye.onclick = togglePassword; }

        const sub = document.getElementById('submitLoginBtn');
        if(sub) { sub.onclick = doLogin; }
        
        const logout = document.getElementById('logoutBtn');
        if(logout) {
            logout.onclick = function() {
                window.location.reload();
            };
        }
    };
</script>
</body>
</html>
